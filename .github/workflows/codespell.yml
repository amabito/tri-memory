name: Codespell

on:
  pull_request:
  push:
    branches: [main]

jobs:
  codespell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: codespell-project/actions-codespell@v2
        with:
          skip: "*.lock,*.json,*.jsonl,*.txt,*.pt,*.bin,.git,artifacts"
          ignore_words_list: "crate,ment,nd,ot,curren,consol,alph,re-used,inconsisten"
